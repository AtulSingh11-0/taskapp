# ── Shared configuration (all environments) ──

spring:
  application:
    name: taskapp

  profiles:
    active: dev

  config:
    import: optional:file:.env[.properties]

  # ── JPA / Hibernate (shared) ──
  jpa:
    open-in-view: false
    properties:
      "[hibernate.jdbc.time_zone]": UTC

  # ── Error handling ──
  web:
    error:
      include-message: always
      include-binding-errors: always

# ── Server ──
server:
  port: 8080

# ── SpringDoc / Swagger ──
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
