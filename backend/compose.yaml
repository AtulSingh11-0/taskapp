# Local development compose — MySQL + Redis
services:
  mysql:
    container_name: taskapp-local-db
    image: 'mysql:8.4'
    environment:
      MYSQL_DATABASE: taskapp_db
      MYSQL_ROOT_PASSWORD: 12345
    ports:
      - '3306:3306'
    volumes:
      - local_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: taskapp-local-redis
    image: 'redis:7-alpine'
    ports:
      - '6379:6379'
    volumes:
      - local_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  local_mysql_data:
  local_redis_data:
